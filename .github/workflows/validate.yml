name: validate-bootstrap

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Validate SQL schema
        run: ./scripts/validate_sql.sh

      - name: Validate contract JSON
        run: ./scripts/validate_json.sh

      - name: Smoke test pipeline seed plus SQLite read API
        run: ./scripts/smoke_pipeline.sh

      - name: Smoke test fixture-backed read API
        run: ./scripts/smoke_read_api.sh

      - name: Smoke test integrated review console
        run: ./scripts/smoke_review_console.sh

      - name: Smoke test SQLite-backed review console
        run: ./scripts/smoke_review_console_sqlite.sh

      - name: Run review-console unit tests
        run: |
          node --test \
            apps/review-console/attention-lanes.test.mjs \
            apps/review-console/confidence-summary.test.mjs \
            apps/review-console/detail-formatters.test.mjs \
            apps/review-console/filter-summary.test.mjs \
            apps/review-console/queue-distribution.test.mjs \
            apps/review-console/review-draft-state.test.mjs \
            apps/review-console/review-history-summary.test.mjs \
            apps/review-console/review-note-suggestions.test.mjs \
            apps/review-console/review-queue-context.test.mjs \
            apps/review-console/review-queue-navigation.test.mjs \
            apps/review-console/saved-views.test.mjs \
            apps/review-console/source-provenance-summary.test.mjs \
            apps/review-console/timeline-entity-summary.test.mjs \
            apps/review-console/timeline-search.test.mjs \
            apps/review-console/view-state.test.mjs
