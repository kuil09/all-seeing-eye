name: validate-bootstrap

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Validate SQL schema
        run: ./scripts/validate_sql.sh

      - name: Validate contract JSON
        run: ./scripts/validate_json.sh

      - name: Smoke test fixture-backed read API
        run: ./scripts/smoke_read_api.sh

      - name: Smoke test integrated review console
        run: ./scripts/smoke_review_console.sh
